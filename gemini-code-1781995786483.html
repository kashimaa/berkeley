<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berkeley City Council Districts</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Make the map fill the entire page container */
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        /* Simple, clean info label on the map */
        .map-title {
            padding: 8px 12px;
            font-size: 14px;
            font-weight: bold;
            background: white;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 5px;
            color: #333;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Initialize the map focused directly over Berkeley
        const map = L.map('map').setView([37.8717, -122.2728], 13);

        // 2. Add a clean, minimal map background (Positron flavor shows labels cleanly under borders)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // 3. Define the styling rules for the layers
        function styleDistrict(feature) {
            const name = feature.properties.name || "";
            
            // Check if this specific feature is District 1
            if (name === "District 1" || name === "1") {
                return {
                    color: "#0056b3",      /* Extra unique, vibrant royal blue outline */
                    weight: 4,             /* Thicker border to make it pop */
                    opacity: 1.0,
                    fillColor: "#0078D4",  /* Clean blue highlight fill */
                    fillOpacity: 0.15      /* Light opacity so base streets remain crisp */
                };
            }
            
            // Standard crisp styling for all other districts
            return {
                color: "#4A4A4A",          /* Distinct dark charcoal outline */
                weight: 1.5,               /* Cleaner, thinner lines for non-target boundaries */
                opacity: 0.8,
                fillColor: "#000000",
                fillOpacity: 0.0           /* Completely transparent fills to eliminate clutter */
            };
        }

        // 4. Interaction handling: show a clean popup when clicking a district
        function onEachFeature(feature, layer) {
            if (feature.properties && feature.properties.name) {
                layer.bindPopup("<strong>" + feature.properties.name + "</strong>");
            }
        }

        // 5. Fetch and load your CouncilDistricts.json file locally
        fetch('CouncilDistricts.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error("Could not find or read CouncilDistricts.json. Make sure it is in the same folder.");
                }
                return response.json();
            })
            .then(geojsonData => {
                L.geoJSON(geojsonData, {
                    style: styleDistrict,
                    onEachFeature: onEachFeature
                }).addTo(map);
            })
            .catch(error => {
                console.error("Error loading the map data:", error);
                alert("Map Loading Error: Look at your browser console tools or verify that CouncilDistricts.json is sitting right next to this index.html file.");
            });

        // 6. Simple title card overlay
        const titleControl = L.control({position: 'topright'});
        titleControl.onAdd = function () {
            const div = L.DomUtil.create('div', 'map-title');
            div.innerHTML = 'Berkeley City Council Districts';
            return div;
        };
        titleControl.addTo(map);

    </script>
</body>
</html>
