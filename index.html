<style>

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;

    width: 100%;

    inset: 0;
    background: #0a0a0a;
  }

  .panel {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 1000;
    background: var(--panel-bg);
    color: var(--text-color);
    padding: 10px 14px;
    border-radius: 10px;
    max-width: 230px;
    font-size: 13px;
    line-height: 1.4;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  .panel h1 {
    font-size: 14px;
    margin: 0 0 4px 0;
    font-weight: 700;
    letter-spacing: 0.2px;
  }

  .panel p {
    margin: 0 0 8px 0;
    opacity: 0.85;
  }

  .legend-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    border: 2px solid var(--district1-color);
    background: color-mix(in srgb, var(--district1-color) 22%, transparent);
    flex-shrink: 0;
  }

  .leaflet-popup-content-wrapper {
    border-radius: 10px;
  }

  .popup-title {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 2px;
  }

  .popup-member {
    font-size: 13px;
    color: #333;
  }

  .district-label {
    background: none;
    border: none;
    box-shadow: none;
    padding: 0;
    font-weight: 700;
    font-size: 11px;
    white-space: nowrap;
    text-shadow: 0 0 3px rgba(0,0,0,0.95), 0 0 3px rgba(0,0,0,0.95);
  }

  .d1-label {
    font-size: 15px;
  }

  @media (max-width: 480px) {
    .panel {
      max-width: 170px;
      font-size: 12px;
      padding: 8px 10px;
    }
    .panel h1 { font-size: 13px; }
  }
</style>

// ---- Map setup ----
const map = L.map('map', {
  zoomControl: false,
  attributionControl: false
});

// Satellite imagery basemap (Esri World Imagery)
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
  attribution: 'Imagery &copy; Esri'
}).addTo(map);

// Roads + street name overlay on top of the imagery — muted so it doesn't
// visually compete with the district outlines. Adjust the filter below to
// taste (lower opacity = fainter roads).
map.createPane('roadsPane');
map.getPane('roadsPane').style.zIndex = 250;
map.getPane('roadsPane').style.filter = 'grayscale(70%) brightness(1.3) opacity(0.5)';

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
  pane: 'roadsPane'
}).addTo(map);

// Place name / neighborhood / boundary label overlay, drawn above the roads
map.createPane('labelsPane');
map.getPane('labelsPane').style.zIndex = 300;

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
  pane: 'labelsPane'
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);
L.control.attribution({ position: 'bottomleft', prefix: false }).addTo(map);

// ---- District styling ----
function isDistrict1(feature) {
  return String(feature.properties.district) === '1';
}

// Distinct color per district. District 1 is controlled by the
// --district1-color CSS variable above so it stays your "brand" color;
// districts 2-8 each get their own fixed color from this palette.
// Swap any hex value below if you want a different look for a district.
const districtColors = {
  '2': '#4E79A7', // blue
  '3': '#59A14F', // green
  '4': '#B07AA1', // purple
  '5': '#EDC948', // yellow
  '6': '#76B7B2', // teal
  '7': '#E15759', // red
  '8': '#FF9DA7'  // pink
};

function colorForDistrict(feature) {
  if (isDistrict1(feature)) {
    return getComputedStyle(document.documentElement).getPropertyValue('--district1-color').trim();
  }
  return districtColors[String(feature.properties.district)] || '#2F6FED';
}

function styleForFeature(feature) {
  const color = colorForDistrict(feature);
  const isD1 = isDistrict1(feature);
  return {
    color: color,
    weight: isD1 ? 5 : 3,
    opacity: isD1 ? 1 : 0.9,
    fillColor: color,
    fillOpacity: isD1 ? 0.2 : 0.16
  };
}

function highlight(e) {
  const layer = e.target;
  const isD1 = isDistrict1(layer.feature);
  layer.setStyle({
    weight: isD1 ? 6.5 : 4.5,
    fillOpacity: isD1 ? 0.34 : 0.28
  });
  layer.bringToFront();
}

function resetHighlight(e) {
  geojsonLayer.resetStyle(e.target);
}

function onEachDistrict(feature, layer) {
  const d = feature.properties.district;
  const member = feature.properties.member || 'TBD';
  const color = colorForDistrict(feature);
  const isD1 = isDistrict1(feature);

  layer.bindPopup(
    `<div class="popup-title">District ${d}</div><div class="popup-member">Councilmember: ${member}</div>`,
    { closeButton: true, maxWidth: 220 }
  );

  layer.bindTooltip(
    `<span style="color:${color}">District ${d}</span>`,
    {
      permanent: true,
      direction: 'center',
      className: isD1 ? 'district-label d1-label' : 'district-label'
    }
  );

  layer.on({
    mouseover: highlight,
    mouseout: resetHighlight,
    click: function (e) {
      highlight(e);
      layer.openPopup();
    }
  });
}

const geojsonLayer = L.geoJSON(districtsGeoJSON, {
  style: styleForFeature,
  onEachFeature: onEachDistrict
}).addTo(map);

// Frame the map to the districts, and keep users anchored to Berkeley
const bounds = geojsonLayer.getBounds();
map.fitBounds(bounds, { padding: [20, 20] });
map.setMaxBounds(bounds.pad(0.6));
map.setMinZoom(map.getZoom() - 1);
</script>
